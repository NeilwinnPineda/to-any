<section class="expo-section">
  <div class="expo-section-header">
    <h2>Buttons</h2>
    <p>Primary actions, secondary actions, ghost buttons, destructive actions, sizes, and icon-only actions.</p>
  </div>
  <div class="expo-stack">
    <div class="expo-row">
      <sc-button variant="primary">Primary</sc-button>
      <sc-button variant="secondary">Secondary</sc-button>
      <sc-button variant="ghost">Ghost</sc-button>
      <sc-button variant="danger">Danger</sc-button>
      <sc-button variant="primary" disabled>Disabled</sc-button>
    </div>
    <div class="expo-row">
      <sc-button variant="primary" size="xs">Extra small</sc-button>
      <sc-button variant="primary" size="sm">Small</sc-button>
      <sc-button variant="primary">Default</sc-button>
      <sc-button variant="primary" size="lg">Large</sc-button>
      <sc-button variant="secondary" icon="sparkles" icon-only label="Spark"></sc-button>
      <sc-button variant="ghost" size="sm" icon="settings" icon-only label="Settings"></sc-button>
    </div>
  </div>
</section>
