@if (sent) {
  <div style="text-align:center;padding:1rem 0">
    <div style="font-size:3rem;margin-bottom:1rem">📬</div>
    <h2 style="font-weight:700;margin-bottom:0.5rem">Check your inbox</h2>
    <p style="color:var(--text-secondary);margin-bottom:1.5rem">We sent a password reset link to your email address.</p>
    <a routerLink="/login" class="btn btn-ghost btn-sm">← Back to sign in</a>
  </div>
} @else {
  <h2 style="font-weight:700;font-size:1.25rem;margin-bottom:0.5rem">Reset your password</h2>
  <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:1.5rem">Enter your email and we'll send you a link to get back in.</p>
  <form (submit)="submit($event)" style="display:flex;flex-direction:column;gap:1rem">
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input class="input" type="email" placeholder="you&#64;example.com" required>
    </div>
    <button type="submit" class="btn btn-primary">Send reset link</button>
    <a routerLink="/login" style="text-align:center;font-size:0.875rem;color:var(--text-secondary);text-decoration:none">← Back to sign in</a>
  </form>
}
