<section class="page-section">
  <div class="page-container">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem">
      <div>
        <span class="label-caps" style="color:var(--color-primary)">Blog</span>
        <h1 style="font-size:2.25rem;font-weight:800;margin-top:0.5rem;letter-spacing:-0.02em">Insights &amp; updates</h1>
      </div>
      <input class="input" type="search" placeholder="Search posts..." style="width:240px">
    </div>

    <div class="card-grid-3">
      <a *ngFor="let p of posts" [routerLink]="'/blog/' + p.slug" class="panel" style="display:flex;flex-direction:column;overflow:hidden;text-decoration:none;color:inherit;cursor:pointer">
        <!-- Color band -->
        <div [style.background]="catColor(p.cat)" style="height:4px"></div>
        <div style="padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;flex:1">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span class="label-caps" [style.color]="catColor(p.cat)">{{ p.cat }}</span>
            @if (p.featured) { <span class="badge badge-primary" style="font-size:0.7rem">Featured</span> }
          </div>
          <h3 style="font-size:1rem;font-weight:700;line-height:1.4;flex:1">{{ p.title }}</h3>
          <p class="text-sm" style="color:var(--text-secondary);line-height:1.6">{{ p.excerpt }}</p>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:0.75rem;border-top:1px solid var(--border-subtle)">
            <div style="display:flex;align-items:center;gap:0.5rem">
              <div [style.background]="p.color" style="width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#fff">{{ p.initials }}</div>
              <span class="text-sm" style="color:var(--text-secondary)">{{ p.author }}</span>
            </div>
            <span class="text-sm" style="color:var(--text-muted)">{{ p.date }} · {{ p.readTime }}</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</section>
