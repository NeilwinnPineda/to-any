<div style="padding:1.75rem;display:flex;flex-direction:column;gap:2rem">

  <!-- Page header -->
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1 style="font-size:1.375rem;font-weight:700;margin-bottom:0.25rem">Dashboard</h1>
      <p class="text-sm" style="color:var(--text-secondary)">Welcome back, Jane. Here's what's happening.</p>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button class="btn btn-ghost btn-sm">Export</button>
      <button class="btn btn-primary btn-sm">+ New project</button>
    </div>
  </div>

  <!-- KPI cards -->
  <div class="stats-row">
    <div *ngFor="let m of metrics" class="panel" style="padding:1.25rem;display:flex;align-items:flex-start;gap:1rem">
      <div [style.background]="m.color + '20'" [style.color]="m.color" style="width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0">
        {{ m.icon }}
      </div>
      <div style="flex:1;min-width:0">
        <div class="text-sm" style="color:var(--text-secondary);margin-bottom:0.25rem">{{ m.label }}</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--text-primary)">{{ m.value }}</div>
        <div class="text-sm" style="margin-top:0.25rem" [style.color]="m.up ? 'var(--color-success)' : 'var(--color-danger)'">
          {{ m.up ? '▲' : '▼' }} {{ m.change }} vs last month
        </div>
      </div>
    </div>
  </div>

  <!-- Chart placeholder -->
  <div class="panel" style="padding:1.5rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <h3 style="font-size:0.9375rem;font-weight:600">User Growth</h3>
      <select class="input" style="width:140px;font-size:0.8rem;padding:0.375rem 0.75rem">
        <option>Last 12 months</option>
        <option>Last 6 months</option>
        <option>Last 30 days</option>
      </select>
    </div>
    <div style="height:200px;background:var(--bg-elevated);border-radius:var(--radius-sm);display:flex;align-items:flex-end;padding:1rem;gap:0.5rem;overflow:hidden">
      <div *ngFor="let h of [30,42,55,48,62,74,68,82,95,88,106,118]" style="flex:1;background:var(--color-primary);opacity:0.7;border-radius:2px 2px 0 0;transition:height 0.3s"
        [style.height.%]="(h / 118) * 100"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:0.5rem">
      <span *ngFor="let m of ['Jan','Mar','May','Jul','Sep','Nov']" class="text-sm" style="color:var(--text-muted);font-size:0.7rem">{{ m }}</span>
    </div>
  </div>

  <!-- Recent users table -->
  <div class="panel" style="overflow:hidden">
    <div style="padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-subtle)">
      <h3 style="font-size:0.9375rem;font-weight:600">Recent Users</h3>
      <a routerLink="/users" class="btn btn-ghost btn-sm" style="text-decoration:none">View all</a>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Plan</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of users">
            <td>
              <div style="display:flex;align-items:center;gap:0.625rem">
                <div style="width:30px;height:30px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0">{{ initials(u.name) }}</div>
                <span style="font-weight:500">{{ u.name }}</span>
              </div>
            </td>
            <td style="color:var(--text-secondary)">{{ u.email }}</td>
            <td><span class="badge" [style.background]="u.planColor + '20'" [style.color]="u.planColor" style="font-size:0.7rem">{{ u.plan }}</span></td>
            <td style="color:var(--text-secondary)">{{ u.joined }}</td>
            <td><button class="btn btn-ghost btn-sm">View</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
