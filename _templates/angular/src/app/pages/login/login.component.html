<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.375rem">Welcome back</h2>
<p class="text-sm" style="color:var(--text-secondary);margin-bottom:2rem">Sign in to your account to continue.</p>

<!-- OAuth -->
<div style="display:flex;flex-direction:column;gap:0.625rem;margin-bottom:1.5rem">
  <button class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:0.625rem">
    <span>G</span> Continue with Google
  </button>
  <button class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:0.625rem">
    <span>⌥</span> Continue with GitHub
  </button>
</div>

<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
  <hr style="flex:1;border:none;border-top:1px solid var(--border-subtle)">
  <span class="text-sm" style="color:var(--text-muted);white-space:nowrap">or with email</span>
  <hr style="flex:1;border:none;border-top:1px solid var(--border-subtle)">
</div>

<form (submit)="submit($event)" style="display:flex;flex-direction:column;gap:1.125rem">
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="input" type="email" placeholder="you@example.com" required>
  </div>
  <div class="form-group">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <label class="form-label">Password</label>
      <a routerLink="/forgot-password" style="font-size:0.8rem;color:var(--color-primary);text-decoration:none">Forgot password?</a>
    </div>
    <input class="input" type="password" placeholder="••••••••" required>
  </div>
  <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.25rem">Sign in</button>
</form>

<p class="text-sm" style="text-align:center;color:var(--text-secondary);margin-top:1.5rem">
  Don't have an account? <a routerLink="/register" style="color:var(--color-primary);text-decoration:none">Create one free</a>
</p>
