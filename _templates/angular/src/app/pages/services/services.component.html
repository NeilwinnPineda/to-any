<!-- Hero -->
<section style="padding:5rem 0 3rem;text-align:center">
  <div class="page-container">
    <span class="label-caps" style="color:var(--color-primary)">What we offer</span>
    <h1 style="font-size:clamp(2rem,4vw,3rem);font-weight:800;margin:0.75rem 0 1rem;letter-spacing:-0.02em">Everything you need to ship.</h1>
    <p style="font-size:1.0625rem;color:var(--text-secondary);max-width:500px;margin:0 auto">
      From blank canvas to production-ready product — Acme Studio covers the full stack.
    </p>
  </div>
</section>

<!-- Service cards -->
<section class="page-section" style="padding-top:2rem">
  <div class="page-container">
    <div class="card-grid-3">
      <div *ngFor="let s of services" class="panel" style="padding:1.75rem;display:flex;flex-direction:column;gap:1rem;transition:border-color 0.2s;border:1px solid var(--border-subtle)">
        <div style="font-size:2rem">{{ s.icon }}</div>
        <h3 style="font-weight:700;font-size:1.0625rem">{{ s.title }}</h3>
        <p class="text-sm" style="color:var(--text-secondary);line-height:1.7;flex:1">{{ s.desc }}</p>
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem">
          <span *ngFor="let tag of s.tags" class="badge" style="font-size:0.7rem">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="cta-band" style="margin-top:2rem">
  <div class="page-container">
    <h2 style="font-size:1.75rem;font-weight:800;color:#fff;margin-bottom:0.75rem">Start building today.</h2>
    <p style="color:rgba(255,255,255,0.8);margin-bottom:2rem">All services included. Free tier available.</p>
    <div style="display:flex;gap:1rem;justify-content:center">
      <a routerLink="/register" class="btn" style="background:#fff;color:var(--color-primary);font-weight:700">Get started free</a>
      <a routerLink="/pricing"  class="btn" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)">See pricing</a>
    </div>
  </div>
</section>
