<section class="page-section">
  <div class="page-container">

    <a routerLink="/products" style="display:inline-flex;align-items:center;gap:0.5rem;font-size:0.875rem;color:var(--text-secondary);text-decoration:none;margin-bottom:2rem">
      ← Back to products
    </a>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;max-width:900px">

      <!-- Image -->
      <div style="background:var(--bg-elevated);border-radius:var(--radius-sm);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:4rem;border:1px solid var(--border-subtle)">
        📦
      </div>

      <!-- Info -->
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        @if (product.badge) {
          <span class="badge badge-primary" style="align-self:flex-start">{{ product.badge }}</span>
        }
        <h1 style="font-size:1.625rem;font-weight:800;letter-spacing:-0.02em;margin:0">{{ product.name }}</h1>

        <!-- Rating -->
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span *ngFor="let s of stars(product.rating)" style="color:#f59e0b">★</span>
          <span style="font-size:0.875rem;color:var(--text-secondary)">{{ product.rating }} · {{ product.reviews }} reviews</span>
        </div>

        <div style="font-size:2rem;font-weight:800">${{ product.price }}</div>

        <!-- Qty + Add -->
        <div style="display:flex;align-items:center;gap:0.75rem">
          <div style="display:flex;align-items:center;border:1px solid var(--border-subtle);border-radius:var(--radius-sm);overflow:hidden">
            <button (click)="dec()" class="btn btn-ghost btn-sm" style="border-radius:0;border:none;padding:0.5rem 0.875rem">−</button>
            <span style="padding:0 0.875rem;font-weight:600;min-width:2rem;text-align:center">{{ qty }}</span>
            <button (click)="inc()" class="btn btn-ghost btn-sm" style="border-radius:0;border:none;padding:0.5rem 0.875rem">+</button>
          </div>
          <button (click)="addToCart()" class="btn btn-primary" style="flex:1">
            {{ added ? '✓ Added to cart' : 'Add to cart' }}
          </button>
        </div>

        <!-- Tabs -->
        <div style="border-top:1px solid var(--border-subtle);padding-top:1.25rem">
          <div style="display:flex;gap:0;margin-bottom:1.25rem;border-bottom:1px solid var(--border-subtle)">
            <button *ngFor="let t of ['description','specs']" (click)="tab=t" class="btn btn-ghost btn-sm"
              style="border-radius:0;border:none;border-bottom:2px solid transparent;padding-bottom:0.625rem;text-transform:capitalize"
              [style.border-bottom-color]="tab===t ? 'var(--color-primary)' : 'transparent'"
              [style.color]="tab===t ? 'var(--color-primary)' : 'var(--text-secondary)'">
              {{ t }}
            </button>
          </div>

          @if (tab === 'description') {
            <p style="font-size:0.9rem;color:var(--text-secondary);line-height:1.7">{{ product.desc }}</p>
          }
          @if (tab === 'specs') {
            <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:0.5rem">
              <li *ngFor="let s of product.specs" style="display:flex;align-items:center;gap:0.625rem;font-size:0.875rem;color:var(--text-secondary)">
                <span style="color:var(--color-primary);font-size:1rem">✓</span> {{ s }}
              </li>
            </ul>
          }
        </div>
      </div>
    </div>
  </div>
</section>
