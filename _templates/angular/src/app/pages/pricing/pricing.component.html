<!-- Hero -->
<section style="padding:5rem 0 3rem;text-align:center">
  <div class="page-container">
    <span class="label-caps" style="color:var(--color-primary)">Pricing</span>
    <h1 style="font-size:clamp(2rem,4vw,3rem);font-weight:800;margin:0.75rem 0 1rem;letter-spacing:-0.02em">Simple pricing. No surprises.</h1>
    <p style="color:var(--text-secondary);max-width:480px;margin:0 auto 2rem">All plans include SuperCSS, the view library, and the mock data layer.</p>

    <!-- Toggle -->
    <div style="display:inline-flex;align-items:center;gap:0.75rem;background:var(--bg-surface);padding:0.375rem 1rem;border-radius:999px;border:1px solid var(--border-subtle)">
      <span class="text-sm" [style.color]="!annual ? 'var(--text-primary)' : 'var(--text-secondary)'">Monthly</span>
      <button (click)="annual=!annual" style="width:40px;height:22px;border-radius:999px;border:none;cursor:pointer;transition:background 0.2s;position:relative;"
        [style.background]="annual ? 'var(--color-primary)' : 'var(--border-default)'">
        <span style="position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s;" [style.left]="annual ? '21px' : '3px'"></span>
      </button>
      <span class="text-sm" [style.color]="annual ? 'var(--text-primary)' : 'var(--text-secondary)'">Annual <span style="color:var(--color-success);font-weight:600">−20%</span></span>
    </div>
  </div>
</section>

<!-- Pricing cards -->
<section style="padding:1rem 0 5rem">
  <div class="page-container">
    <div class="pricing-grid">
      <div *ngFor="let t of tiers" class="panel"
        [style.border]="t.highlight ? '2px solid var(--color-primary)' : '1px solid var(--border-subtle)'"
        style="padding:2rem;display:flex;flex-direction:column;gap:1.25rem;position:relative">
        <span *ngIf="t.badge" class="badge badge-primary" style="position:absolute;top:-0.875rem;left:50%;transform:translateX(-50%);font-size:0.75rem">{{ t.badge }}</span>
        <div>
          <h3 style="font-weight:700;font-size:1.125rem;margin-bottom:0.375rem">{{ t.name }}</h3>
          <div style="font-size:1.75rem;font-weight:800;color:var(--text-primary)">{{ price(t) }}</div>
          <p class="text-sm" style="color:var(--text-secondary);margin-top:0.375rem">{{ t.desc }}</p>
        </div>
        <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:0.625rem;flex:1">
          <li *ngFor="let f of t.features" class="text-sm" style="display:flex;align-items:flex-start;gap:0.5rem;color:var(--text-secondary)">
            <span style="color:var(--color-success);flex-shrink:0;margin-top:0.1em">✓</span> {{ f }}
          </li>
        </ul>
        <a [routerLink]="t.href" class="btn" [class.btn-primary]="t.highlight" [class.btn-ghost]="!t.highlight" style="text-align:center;text-decoration:none">{{ t.cta }}</a>
      </div>
    </div>
  </div>
</section>
