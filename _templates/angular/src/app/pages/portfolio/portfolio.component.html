<section class="page-section">
  <div class="page-container">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:3rem">
      <span class="label-caps" style="color:var(--color-primary)">Our work</span>
      <h1 style="font-size:2.25rem;font-weight:800;margin:0.5rem 0 0.75rem;letter-spacing:-0.02em">Projects we're proud of.</h1>
      <p style="color:var(--text-secondary);max-width:480px;margin:0 auto">A selection of products and platforms we've designed, built, and shipped.</p>
    </div>

    <!-- Filter -->
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:2.5rem">
      <button *ngFor="let f of filters" (click)="filter=f" class="btn btn-sm"
        [class.btn-primary]="filter===f"
        [class.btn-ghost]="filter!==f"
        style="text-transform:capitalize">{{ f }}</button>
    </div>

    <!-- Grid -->
    <div class="card-grid-3">
      <div *ngFor="let p of visible" class="panel" style="display:flex;flex-direction:column;gap:0;overflow:hidden">
        <!-- Color band -->
        <div [style.background]="p.color" style="height:6px"></div>
        <div style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem;flex:1">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)">{{ p.cat }}</span>
            <span style="font-size:0.75rem;color:var(--text-muted)">{{ p.year }}</span>
          </div>
          <div>
            <h3 style="font-weight:700;font-size:1rem;margin-bottom:0.5rem">{{ p.title }}</h3>
            <p style="font-size:0.875rem;color:var(--text-secondary);line-height:1.6">{{ p.desc }}</p>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:0.375rem;margin-top:auto">
            <span *ngFor="let tag of p.tags" class="badge" style="font-size:0.7rem">{{ tag }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
