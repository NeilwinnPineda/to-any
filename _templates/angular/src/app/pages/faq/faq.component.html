<section class="page-section">
  <div class="page-container" style="max-width:740px">
    <div style="text-align:center;margin-bottom:3rem">
      <span class="label-caps" style="color:var(--color-primary)">FAQ</span>
      <h1 style="font-size:2.25rem;font-weight:800;margin:0.5rem 0 0.75rem;letter-spacing:-0.02em">Frequently asked questions</h1>
      <p style="color:var(--text-secondary)">Can't find the answer? <a routerLink="/contact" style="color:var(--color-primary)">Contact us.</a></p>
    </div>

    <div>
      <div *ngFor="let f of faqs; let i = index" class="accordion-item">
        <button class="accordion-trigger" (click)="toggle(i)">
          {{ f.q }}
          <span style="font-size:1.25rem;color:var(--text-secondary);flex-shrink:0;transition:transform 0.2s" [style.transform]="f.open ? 'rotate(45deg)' : 'none'">+</span>
        </button>
        @if (f.open) {
          <div class="accordion-body">{{ f.a }}</div>
        }
      </div>
    </div>
  </div>
</section>
