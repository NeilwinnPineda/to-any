<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.375rem">Create your account</h2>
<p class="text-sm" style="color:var(--text-secondary);margin-bottom:2rem">Free forever. No credit card required.</p>

<div style="display:flex;flex-direction:column;gap:0.625rem;margin-bottom:1.5rem">
  <button class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:0.625rem">
    <span>G</span> Sign up with Google
  </button>
  <button class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:0.625rem">
    <span>⌥</span> Sign up with GitHub
  </button>
</div>

<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
  <hr style="flex:1;border:none;border-top:1px solid var(--border-subtle)">
  <span class="text-sm" style="color:var(--text-muted);white-space:nowrap">or with email</span>
  <hr style="flex:1;border:none;border-top:1px solid var(--border-subtle)">
</div>

<form (submit)="submit($event)" style="display:flex;flex-direction:column;gap:1.125rem">
  <div class="form-group">
    <label class="form-label">Full name</label>
    <input class="input" type="text" placeholder="Jane Smith" required>
  </div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="input" type="email" placeholder="you@example.com" required>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="input" type="password" placeholder="8+ characters" required>
    <span style="font-size:0.75rem;color:var(--text-muted)">Minimum 8 characters</span>
  </div>
  <label style="display:flex;align-items:flex-start;gap:0.625rem;cursor:pointer">
    <input type="checkbox" required style="margin-top:0.2rem">
    <span class="text-sm" style="color:var(--text-secondary)">I agree to the <a routerLink="/terms" style="color:var(--color-primary);text-decoration:none">Terms of Service</a> and <a routerLink="/privacy" style="color:var(--color-primary);text-decoration:none">Privacy Policy</a></span>
  </label>
  <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.25rem">Create account</button>
</form>

<p class="text-sm" style="text-align:center;color:var(--text-secondary);margin-top:1.5rem">
  Already have an account? <a routerLink="/login" style="color:var(--color-primary);text-decoration:none">Sign in</a>
</p>
