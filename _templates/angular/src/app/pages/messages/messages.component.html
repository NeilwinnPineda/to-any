<div style="display:flex;height:calc(100vh - 56px);overflow:hidden">

  <!-- Thread list -->
  <div style="width:280px;flex-shrink:0;border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow-y:auto">
    <div style="padding:1.25rem 1rem 0.875rem;border-bottom:1px solid var(--border-subtle)">
      <h1 style="font-size:1.125rem;font-weight:700;margin-bottom:0.75rem">Messages</h1>
      <input class="input" placeholder="Search conversations..." style="font-size:0.875rem">
    </div>
    <div *ngFor="let t of threads" (click)="active=t.id"
      style="display:flex;align-items:center;gap:0.75rem;padding:0.875rem 1rem;cursor:pointer;border-bottom:1px solid var(--border-subtle);transition:background 0.15s"
      [style.background]="active===t.id ? 'var(--bg-elevated)' : 'transparent'">
      <div style="position:relative;flex-shrink:0">
        <div [style.background]="t.color" style="width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700">{{ t.initials }}</div>
        <span *ngIf="t.unread" style="position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:var(--color-primary);border-radius:50%;border:2px solid var(--bg-surface);font-size:0.6rem;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">{{ t.unread }}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:0.5rem">
          <span [style.font-weight]="t.unread ? 700 : 500" style="font-size:0.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ t.name }}</span>
          <span style="font-size:0.7rem;color:var(--text-muted);flex-shrink:0">{{ t.time }}</span>
        </div>
        <div style="font-size:0.8rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ t.last }}</div>
      </div>
    </div>
  </div>

  <!-- Thread view -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">

    <!-- Header -->
    <div style="padding:0.875rem 1.25rem;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:0.75rem;flex-shrink:0">
      <div [style.background]="threads[active].color" style="width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700">{{ threads[active].initials }}</div>
      <div>
        <div style="font-weight:600;font-size:0.9rem">{{ threads[active].name }}</div>
        <div style="font-size:0.75rem;color:var(--color-success,#10b981)">● Online</div>
      </div>
    </div>

    <!-- Messages -->
    <div style="flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:0.875rem">
      <div *ngFor="let m of messages" style="display:flex" [style.justify-content]="m.from==='me' ? 'flex-end' : 'flex-start'">
        <div style="max-width:68%">
          <div [style.background]="m.from==='me' ? 'var(--color-primary)' : 'var(--bg-elevated)'"
               [style.color]="m.from==='me' ? '#fff' : 'var(--text-primary)'"
               style="padding:0.625rem 0.875rem;border-radius:12px;font-size:0.875rem;line-height:1.5">{{ m.text }}</div>
          <div style="font-size:0.7rem;color:var(--text-muted);margin-top:0.25rem" [style.text-align]="m.from==='me' ? 'right' : 'left'">{{ m.time }}</div>
        </div>
      </div>
    </div>

    <!-- Compose -->
    <div style="padding:0.875rem 1.25rem;border-top:1px solid var(--border-subtle);display:flex;gap:0.625rem;flex-shrink:0">
      <input class="input" placeholder="Type a message..." style="flex:1;font-size:0.875rem">
      <button class="btn btn-primary btn-sm">Send</button>
    </div>

  </div>
</div>
