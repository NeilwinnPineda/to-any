<div style="padding:1.75rem;max-width:680px">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
    <div>
      <h1 style="font-size:1.375rem;font-weight:700;margin-bottom:0.25rem">Notifications</h1>
      <p class="text-sm" style="color:var(--text-secondary)">3 unread notifications</p>
    </div>
    <button class="btn btn-ghost btn-sm">Mark all read</button>
  </div>

  <div class="panel" style="overflow:hidden">
    <div *ngFor="let n of notifs" class="notif-item" [style.background]="n.unread ? 'var(--bg-elevated)' : 'transparent'">
      <div [style.opacity]="n.unread ? 1 : 0" class="notif-dot"></div>
      <div style="font-size:1.375rem;flex-shrink:0;width:2rem;text-align:center">{{ n.icon }}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:{{ n.unread ? 600 : 400 }};font-size:0.9rem;margin-bottom:0.25rem">{{ n.title }}</div>
        <p class="text-sm" style="color:var(--text-secondary);line-height:1.5">{{ n.body }}</p>
      </div>
      <span class="text-sm" style="color:var(--text-muted);white-space:nowrap;flex-shrink:0">{{ n.time }}</span>
    </div>
  </div>

</div>
