<section class="page-section">
  <div class="page-container" style="max-width:720px">

    <h1 style="font-size:2rem;font-weight:800;margin-bottom:1.5rem;letter-spacing:-0.02em">Search</h1>

    <div style="position:relative;margin-bottom:1.5rem">
      <span style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--text-muted)">🔍</span>
      <input class="input" style="padding-left:2.5rem;font-size:1rem" placeholder="Search docs, blog, products...">
    </div>

    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem">
      <button *ngFor="let f of filters" (click)="filter=f" class="btn btn-sm"
        [class.btn-primary]="filter===f"
        [class.btn-ghost]="filter!==f"
        style="text-transform:capitalize">{{ f }}</button>
    </div>

    <p style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:1.25rem">
      {{ visible.length }} result{{ visible.length !== 1 ? 's' : '' }}
    </p>

    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <a *ngFor="let r of visible" [attr.href]="r.path"
        style="display:block;padding:1.25rem;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);background:var(--bg-surface);text-decoration:none">
        <div style="display:flex;align-items:center;gap:0.625rem;margin-bottom:0.5rem">
          <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:0.2rem 0.5rem;border-radius:4px"
            [style.background]="typeColor(r.type) + '22'"
            [style.color]="typeColor(r.type)">{{ r.type }}</span>
        </div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--text-primary);margin-bottom:0.375rem">{{ r.title }}</div>
        <p style="font-size:0.875rem;color:var(--text-secondary);line-height:1.5;margin:0">{{ r.excerpt }}</p>
      </a>
    </div>

  </div>
</section>
