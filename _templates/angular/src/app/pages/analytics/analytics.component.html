<div style="padding:1.75rem">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div>
      <h1 style="font-size:1.375rem;font-weight:700;margin-bottom:0.25rem">Analytics</h1>
      <p class="text-sm" style="color:var(--text-secondary)">Site performance and traffic overview.</p>
    </div>
    <div style="display:flex;gap:0.375rem">
      <button *ngFor="let r of ranges" (click)="range=r" class="btn btn-sm"
        [class.btn-subtle]="range===r"
        [class.btn-ghost]="range!==r">{{ r }}</button>
    </div>
  </div>

  <!-- KPI cards -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem">
    <div *ngFor="let k of kpis" class="panel" style="padding:1.25rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem">
        <span style="font-size:0.8rem;color:var(--text-secondary);font-weight:500">{{ k.label }}</span>
        <span style="font-size:1.125rem">{{ k.icon }}</span>
      </div>
      <div style="font-size:1.625rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.25rem">{{ k.value }}</div>
      <div style="font-size:0.8rem" [style.color]="k.up ? '#10b981' : '#ef4444'">{{ k.change }} vs last period</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:1.5rem;align-items:start">

    <!-- Bar chart -->
    <div class="panel"><div class="panel-body">
      <h3 style="font-weight:600;margin-bottom:1.5rem">Page views by month</h3>
      <div style="display:flex;align-items:flex-end;gap:6px;height:140px;margin-bottom:0.625rem">
        <div *ngFor="let b of bars; let i = index" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
          <div [style.height.px]="(b/maxBar)*128" style="width:100%;background:var(--color-primary);opacity:0.75;border-radius:3px 3px 0 0"></div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <span *ngFor="let m of months" style="flex:1;text-align:center;font-size:0.65rem;color:var(--text-muted)">{{ m }}</span>
      </div>
    </div></div>

    <!-- Top pages -->
    <div class="panel"><div class="panel-body">
      <h3 style="font-weight:600;margin-bottom:1.25rem">Top pages</h3>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div *ngFor="let p of topPages">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.375rem">
            <span style="font-size:0.8rem;font-weight:500;font-family:monospace">{{ p.path }}</span>
            <span style="font-size:0.8rem;color:var(--text-secondary)">{{ p.views.toLocaleString() }}</span>
          </div>
          <div style="height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden">
            <div [style.width.%]="p.pct" style="height:100%;background:var(--color-primary);border-radius:2px;transition:width 0.4s"></div>
          </div>
        </div>
      </div>
    </div></div>

  </div>
</div>
