<div style="padding:1.75rem;display:flex;flex-direction:column;gap:2rem;max-width:720px">

  <!-- Header -->
  <div>
    <h1 style="font-size:1.375rem;font-weight:700;margin-bottom:0.25rem">Profile</h1>
    <p class="text-sm" style="color:var(--text-secondary)">Manage your personal information.</p>
  </div>

  <!-- Avatar card -->
  <div class="panel" style="padding:1.5rem;display:flex;align-items:center;gap:1.5rem">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;flex-shrink:0">JD</div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:1.0625rem;margin-bottom:0.25rem">Jane Doe</div>
      <div class="text-sm" style="color:var(--text-secondary)">jane&#64;example.com · Pro plan</div>
    </div>
    <button class="btn btn-ghost btn-sm">Change photo</button>
  </div>

  <!-- Edit form -->
  <div class="panel">
    <div class="panel-body">
      <h3 style="font-weight:600;margin-bottom:1.5rem">Personal information</h3>
      <form (submit)="save($event)" style="display:flex;flex-direction:column;gap:1.25rem">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First name</label>
            <input class="input" type="text" value="Jane">
          </div>
          <div class="form-group">
            <label class="form-label">Last name</label>
            <input class="input" type="text" value="Doe">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="input" type="email" value="jane@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea class="input" rows="3" style="resize:vertical">Product builder. Coffee enjoyer. Occasional open-source contributor.</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Website</label>
          <input class="input" type="url" placeholder="https://yoursite.com">
        </div>
        <div style="display:flex;align-items:center;gap:1rem;margin-top:0.5rem">
          <button type="submit" class="btn btn-primary btn-sm">{{ saved ? '✓ Saved' : 'Save changes' }}</button>
          <button type="button" class="btn btn-ghost btn-sm">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</div>
