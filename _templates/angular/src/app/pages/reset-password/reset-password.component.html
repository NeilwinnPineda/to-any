<h2 style="font-weight:700;font-size:1.25rem;margin-bottom:0.5rem">Set a new password</h2>
<p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:1.5rem">Choose a strong password — at least 8 characters.</p>
<form (submit)="submit($event)" style="display:flex;flex-direction:column;gap:1rem">
  <div class="form-group">
    <label class="form-label">New password</label>
    <input class="input" type="password" placeholder="8+ characters" required>
  </div>
  <div class="form-group">
    <label class="form-label">Confirm new password</label>
    <input class="input" type="password" placeholder="Repeat password" required>
  </div>
  <button type="submit" class="btn btn-primary">Update password</button>
  <a routerLink="/login" style="text-align:center;font-size:0.875rem;color:var(--text-secondary);text-decoration:none">← Back to sign in</a>
</form>
