<!-- Floating toggle button -->
<div style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:0.75rem">

  <!-- Panel -->
  @if (open) {
  <div style="background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:1.25rem;width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:1.25rem">

    <!-- Theme -->
    <div>
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.5rem">Theme</div>
      <div style="display:flex;flex-wrap:wrap;gap:0.375rem">
        <button *ngFor="let t of themes" (click)="setTheme(t)"
          style="font-size:0.75rem;padding:0.25rem 0.625rem;border-radius:4px;border:1px solid;cursor:pointer;transition:all 0.15s;text-transform:capitalize"
          [style.background]="theme===t ? 'var(--color-primary)' : 'var(--bg-elevated)'"
          [style.color]="theme===t ? '#fff' : 'var(--text-secondary)'"
          [style.border-color]="theme===t ? 'var(--color-primary)' : 'var(--border-subtle)'">
          {{ t }}
        </button>
      </div>
    </div>

    <!-- Palette -->
    <div>
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.5rem">Palette</div>
      <div style="display:flex;gap:0.5rem">
        <button *ngFor="let p of palettes" (click)="setPalette(p)"
          [title]="p"
          style="width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s;position:relative"
          [style.background]="p==='violet' ? '#8b5cf6' : p==='blue' ? '#3b82f6' : p==='emerald' ? '#10b981' : p==='amber' ? '#f59e0b' : '#f43f5e'"
          [style.border-color]="palette===p ? 'var(--text-primary)' : 'transparent'"
          [style.transform]="palette===p ? 'scale(1.2)' : 'scale(1)'">
        </button>
      </div>
    </div>

    <!-- Mode -->
    <div>
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.5rem">Mode</div>
      <div style="display:flex;gap:0.375rem">
        <button *ngFor="let m of modes" (click)="setMode(m)"
          style="flex:1;font-size:0.75rem;padding:0.3rem 0;border-radius:4px;border:1px solid;cursor:pointer;transition:all 0.15s;text-transform:capitalize"
          [style.background]="mode===m ? 'var(--color-primary)' : 'var(--bg-elevated)'"
          [style.color]="mode===m ? '#fff' : 'var(--text-secondary)'"
          [style.border-color]="mode===m ? 'var(--color-primary)' : 'var(--border-subtle)'">
          {{ m === 'dark' ? '🌙 Dark' : '☀️ Light' }}
        </button>
      </div>
    </div>

  </div>
  }

  <!-- FAB -->
  <button (click)="open=!open"
    style="width:44px;height:44px;border-radius:50%;background:var(--color-primary);color:#fff;border:none;cursor:pointer;font-size:1.125rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:transform 0.15s"
    [style.transform]="open ? 'rotate(45deg)' : 'rotate(0)'"
    title="Theme controls">
    🎨
  </button>

</div>
